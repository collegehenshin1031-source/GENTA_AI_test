name: Daily Update

on:
  schedule:
    # 毎日 07:30 UTC = 16:30 JST（平日のみ）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手動実行用

# data/ratios.json をコミットして push するために必要。
# Actions の既定権限が read-only のリポジトリでは git push が 403 で失敗するので明示。
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 依存関係の漏れ/バージョン差によるエラーを避けるため requirements.txt に統一
          pip install -r requirements.txt
      
      - name: Fetch volume data
        run: python fetch_data.py
      
      - name: Send notifications
        env:
          GSHEETS_CREDENTIALS: ${{ secrets.GSHEETS_CREDENTIALS }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: python send_notifications.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ratios.json
          # 変更がある場合のみコミット & push
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "📊 Update volume data $(date +'%Y-%m-%d %H:%M')"
          git push
