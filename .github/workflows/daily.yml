name: Daily Update (TEST - No Email)

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch volume data
        run: python fetch_data.py

      - name: Notifications disabled in TEST
        run: echo "TEST environment: email notifications are disabled."

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ratios.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "📊 Update volume data (TEST) $(date +'%Y-%m-%d %H:%M')"
          git push
