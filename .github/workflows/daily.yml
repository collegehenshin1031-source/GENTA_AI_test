name: Daily Update

on:
  schedule:
    # 毎日 07:30 UTC = 16:30 JST（平日のみ）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手動実行用

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz gspread google-auth cryptography
      
      - name: Fetch volume data
        run: python fetch_data.py
      
      - name: Send notifications
        env:
          GSHEETS_CREDENTIALS: ${{ secrets.GSHEETS_CREDENTIALS }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: python send_notifications.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ratios.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update volume data $(date +'%Y-%m-%d %H:%M')"
          git push
